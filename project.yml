name: ListApp
options:
  bundleIdPrefix: com.bart
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  createIntermediateGroups: true
  defaultConfig: Debug

targets:
  # Core library — all business logic, models, parsers, file system
  Core:
    type: framework
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources/Core
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.bart.Core
        PRODUCT_NAME: Core
        SKIP_INSTALL: YES
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"

  # iOS application
  ListApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ListApp
        excludes:
          - Info.plist
          - README.md
    resources:
      - ListApp/PrivacyInfo.xcprivacy
      - ListApp/Assets.xcassets
    dependencies:
      - target: Core
        embed: true
    info:
      path: ListApp/Info.plist
      properties:
        CFBundleDisplayName: Lyst
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        LSRequiresIPhoneOS: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    entitlements:
      path: ListApp/ListApp.entitlements
      properties: {}
    settings:
      base:
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.bvanriessen.listapp
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
      configs:
        Release:
          CODE_SIGN_IDENTITY: "iPhone Distribution"
        Debug:
          CODE_SIGN_IDENTITY: "iPhone Developer"

schemes:
  ListApp:
    build:
      targets:
        ListApp: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
