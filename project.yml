name: ListApp
options:
  bundleIdPrefix: com.bart
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  createIntermediateGroups: true
  defaultConfig: Debug

targets:
  # Core library — all business logic, models, parsers, file system
  Core:
    type: framework
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources/Core
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.bart.Core
        PRODUCT_NAME: Core
        SKIP_INSTALL: YES
        GENERATE_INFOPLIST_FILE: YES

  # iOS application
  ListApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ListApp
        excludes:
          - Info.plist
          - README.md
    dependencies:
      - target: Core
        embed: true
    info:
      path: ListApp/Info.plist
      properties:
        CFBundleDisplayName: ListApp
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        LSRequiresIPhoneOS: true
        UIRequiredDeviceCapabilities:
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    entitlements:
      path: ListApp/ListApp.entitlements
      properties: {}
    settings:
      base:
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.bart.ListApp
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
