name: iOS Build Check

# Compiles the Xcode app target on macOS for fast feedback on SwiftUI/UIKit
# compile issues that Linux `swift test` cannot catch.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ios-build:
    name: xcodebuild (no signing)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Xcode version
        run: xcodebuild -version

      - name: Build ListApp
        run: |
          xcodebuild \
            -project ListApp.xcodeproj \
            -scheme ListApp \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            build
